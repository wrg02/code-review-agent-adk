# Cloud Build: PR review via ADK governance agent
# Trigger: connect this repo to Cloud Build with a Pull Request trigger
# Required substitutions in the trigger: _AGENT_URL, _GITHUB_REPO, _PR_NUMBER
# Required secret in Secret Manager: github-pat

steps:
  # 1. Generate the PR diff
  - name: gcr.io/cloud-builders/git
    id: generate-diff
    entrypoint: bash
    args:
      - -c
      - |
        git fetch origin ${_BASE_BRANCH}
        git diff origin/${_BASE_BRANCH}...${COMMIT_SHA} > /workspace/pr_diff.txt
        echo "Diff generated successfully."
        cat /workspace/pr_diff.txt | head -50

  # 2. Call the governance agent on Cloud Run
  - name: gcr.io/cloud-builders/gcloud
    id: call-agent
    entrypoint: bash
    args:
      - -c
      - |
        apt-get install -y -q jq

        IDENTITY_TOKEN=$(gcloud auth print-identity-token --audiences="${_AGENT_URL}")

        DIFF_CONTENT=$(cat /workspace/pr_diff.txt)
        PAYLOAD=$(jq -n --arg diff "$$DIFF_CONTENT" '{"diff": $$diff}')

        HTTP_CODE=$(curl -s -o /workspace/response.json -w "%{http_code}" \
          -X POST "${_AGENT_URL}/review" \
          -H "Authorization: Bearer $${IDENTITY_TOKEN}" \
          -H "Content-Type: application/json" \
          -d "$$PAYLOAD")

        echo "HTTP status: $$HTTP_CODE"

        if [ "$$HTTP_CODE" -ne 200 ]; then
          echo "Error calling the agent. Response:"
          cat /workspace/response.json
          exit 1
        fi

        jq -r '.feedback_md' /workspace/response.json > /workspace/agent_feedback.md
        jq -r '.approved' /workspace/response.json > /workspace/approved.txt

        echo "Approved: $(cat /workspace/approved.txt)"

  # 3. Post a comment on the GitHub PR
  - name: gcr.io/cloud-builders/curl
    id: post-comment
    entrypoint: bash
    secretEnv: ['GITHUB_PAT']
    args:
      - -c
      - |
        if [ ! -f /workspace/agent_feedback.md ]; then
          echo "No feedback generated. Skipping comment."
          exit 0
        fi

        COMMENT_BODY=$(jq -Rs '.' /workspace/agent_feedback.md)

        curl -s -X POST \
          "https://api.github.com/repos/${_GITHUB_REPO}/issues/${_PR_NUMBER}/comments" \
          -H "Authorization: token $$GITHUB_PAT" \
          -H "Accept: application/vnd.github.v3+json" \
          -d "{\"body\": $${COMMENT_BODY}}"

        echo "Comment posted on PR #${_PR_NUMBER}."

  # 4. Check approval — fail the build if rejected
  - name: ubuntu
    id: check-approval
    entrypoint: bash
    args:
      - -c
      - |
        APPROVED=$(cat /workspace/approved.txt 2>/dev/null || echo "false")
        if [ "$$APPROVED" != "true" ]; then
          echo "PR REJECTED by the governance agent."
          exit 1
        fi
        echo "PR APPROVED by the governance agent."

substitutions:
  _BASE_BRANCH: main
  _AGENT_URL: ''
  _GITHUB_REPO: ''
  _PR_NUMBER: ''

availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/github-pat/versions/latest
      env: GITHUB_PAT

options:
  logging: CLOUD_LOGGING_ONLY
